const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const tooltip = document.getElementById('tooltip');
document.getElementById('stats').textContent = DATA.nodes.length + ' nodes / ' + DATA.links.length + ' edges';

let W = cv.width = window.innerWidth;
let H = cv.height = window.innerHeight;

const nodeMap = {};
DATA.nodes.forEach((n, i) => {
  n.idx = i;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r = 40 + (n.depth >= 0 ? n.depth : 0) * 32 + Math.random() * 20;
  n.x = r * Math.sin(phi) * Math.cos(theta);
  n.y = r * Math.sin(phi) * Math.sin(theta);
  n.z = r * Math.cos(phi);
  n.vx = n.vy = n.vz = 0;
  nodeMap[n.id] = n;
});
DATA.links.forEach(l => { l.s = nodeMap[l.source]; l.t = nodeMap[l.target]; });

const root = nodeMap[DATA.root];
root.fx = 0; root.fy = 0; root.fz = 0;

function step() {
  const nodes = DATA.nodes, links = DATA.links;
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
      let d2 = dx*dx + dy*dy + dz*dz + 0.01;
      let d = Math.sqrt(d2);
      let f = 2500 / d2;
      let fx = f * dx/d, fy = f * dy/d, fz = f * dz/d;
      a.vx -= fx; a.vy -= fy; a.vz -= fz;
      b.vx += fx; b.vy += fy; b.vz += fz;
    }
  }
  const L = 55;
  for (const l of links) {
    let dx = l.t.x - l.s.x, dy = l.t.y - l.s.y, dz = l.t.z - l.s.z;
    let d = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
    let f = (d - L) * 0.04;
    let fx = f * dx/d, fy = f * dy/d, fz = f * dz/d;
    l.s.vx += fx; l.s.vy += fy; l.s.vz += fz;
    l.t.vx -= fx; l.t.vy -= fy; l.t.vz -= fz;
  }
  for (const n of nodes) {
    n.vx += -n.x * 0.002;
    n.vy += -n.y * 0.002;
    n.vz += -n.z * 0.002;
  }
  for (const n of nodes) {
    if (n.fx !== undefined) { n.x = n.fx; n.y = n.fy; n.z = n.fz; n.vx = n.vy = n.vz = 0; continue; }
    n.vx *= 0.85; n.vy *= 0.85; n.vz *= 0.85;
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
  }
}

let yaw = 0.6, pitch = -0.3, zoom = 1, panX = 0, panY = 0;
const FOCAL = 650;

function project(n) {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  let x1 = n.x * cy - n.z * sy;
  let z1 = n.x * sy + n.z * cy;
  let y1 = n.y;
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  let y2 = y1 * cp - z1 * sp;
  let z2 = y1 * sp + z1 * cp;
  let x2 = x1;
  const persp = FOCAL / (FOCAL + z2);
  return {
    sx: W/2 + panX + x2 * persp * zoom,
    sy: H/2 + panY + y2 * persp * zoom,
    depth: z2,
    persp: persp
  };
}

function colorFor(n, persp) {
  let base;
  if (n.terminal) {
    if (n.reason === 'mate') {
      // turn = side-to-move who is mated. mate on white's turn => Black wins.
      base = n.turn === 'w' ? [20,20,20] : [255,255,255];
    } else {
      base = [255,202,40]; // draw
    }
  } else {
    base = n.turn === 'w' ? [79,195,247] : [239,83,80];
  }
  const t = Math.max(0.4, Math.min(1.2, persp));
  return 'rgb(' + Math.floor(base[0]*t) + ',' + Math.floor(base[1]*t) + ',' + Math.floor(base[2]*t) + ')';
}
function strokeFor(n) {
  if (n.id === DATA.root) return { color: '#fff', width: 2 };
  if (n.terminal && n.reason === 'mate' && n.turn === 'w') return { color: '#fff', width: 1.5 };
  return null;
}
function radiusFor(n) {
  if (n.id === DATA.root) return 9;
  if (n.terminal) return 5;
  return 3.5;
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  const proj = DATA.nodes.map(project);

  const linkOrder = DATA.links.map((l, i) => {
    const a = proj[l.s.idx], b = proj[l.t.idx];
    return { i: i, z: (a.depth + b.depth) / 2 };
  }).sort((a,b) => b.z - a.z);

  ctx.lineWidth = 1;
  for (const o of linkOrder) {
    const l = DATA.links[o.i];
    const a = proj[l.s.idx], b = proj[l.t.idx];
    const avgP = (a.persp + b.persp) / 2;
    const alpha = Math.max(0.08, Math.min(0.5, 0.25 * avgP));
    ctx.strokeStyle = 'rgba(200,200,200,' + alpha.toFixed(3) + ')';
    ctx.beginPath();
    ctx.moveTo(a.sx, a.sy);
    ctx.lineTo(b.sx, b.sy);
    ctx.stroke();
  }

  const nodeOrder = DATA.nodes.map((n, i) => ({ n: n, i: i, z: proj[i].depth }))
    .sort((a, b) => b.z - a.z);
  for (const o of nodeOrder) {
    const n = o.n, p = proj[o.i];
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, radiusFor(n) * p.persp * Math.sqrt(zoom), 0, Math.PI * 2);
    ctx.fillStyle = colorFor(n, p.persp);
    ctx.fill();
    const stroke = strokeFor(n);
    if (stroke) {
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width;
      ctx.stroke();
    }
  }
  window._proj = proj;
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

let iterations = 0;
function loop() {
  if (iterations < 800) { step(); iterations++; }
  const rot = 0.025;
  if (keys['a'] || keys['arrowleft'])  yaw   -= rot;
  if (keys['d'] || keys['arrowright']) yaw   += rot;
  if (keys['w'] || keys['arrowup'])    pitch -= rot;
  if (keys['s'] || keys['arrowdown'])  pitch += rot;
  pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
  if (keys['q']) zoom = Math.max(0.2, zoom * 0.98);
  if (keys['e']) zoom = Math.min(8, zoom * 1.02);
  draw();
  requestAnimationFrame(loop);
}
loop();

let dragging = false, lastX, lastY;
cv.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
cv.addEventListener('mousemove', e => {
  if (dragging) {
    panX += (e.clientX - lastX);
    panY += (e.clientY - lastY);
    lastX = e.clientX; lastY = e.clientY;
  }
  const proj = window._proj;
  if (!proj) return;
  let found = null, bestD = 14;
  for (let i = 0; i < DATA.nodes.length; i++) {
    const p = proj[i];
    const d = Math.hypot(p.sx - e.clientX, p.sy - e.clientY);
    if (d < bestD) { bestD = d; found = DATA.nodes[i]; }
  }
  if (found) {
    const squares = found.board.split('').map((c, i) => {
      const sqCls = (i % 2 === 0) ? 'light' : 'dark';
      let inner = '';
      if (c !== '.') {
        const isWhite = c === c.toUpperCase();
        const key = (isWhite ? 'w' : 'b') + c.toUpperCase();
        inner = '<img src="' + PIECES[key] + '" alt="' + c + '">';
      }
      return '<div class="sq ' + sqCls + '">' + inner + '</div>';
    }).join('');
    const boardStr = '<div class="board">' + squares + '</div>';
    const turn = found.turn === 'w' ? 'White to move' : 'Black to move';
    const extra = found.terminal ? ' - ' + found.reason : '';
    tooltip.innerHTML = boardStr +
      '<div class="meta">' + turn + extra + ' &middot; depth ' + found.depth + '</div>';
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY + 14) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoom = Math.max(0.2, Math.min(8, zoom * factor));
}, { passive: false });

window.addEventListener('resize', () => {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
});
</script>
