<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexagonal Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: #16213e;
    z-index: 10;
  }
  #header h1 { font-size: 1.3rem; color: #e94560; }
  #status { font-size: 1.1rem; text-align: center; }
  #status .player-x { color: #4fc3f7; }
  #status .player-o { color: #ef5350; }
  #btn-reset {
    padding: 8px 18px;
    background: #e94560;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  #btn-reset:hover { background: #c73650; }
  canvas { flex: 1; display: block; cursor: grab; }
  canvas.placing { cursor: pointer; }
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    justify-content: center; align-items: center;
  }
  #win-overlay.show { display: flex; }
  #win-box {
    background: #16213e; padding: 40px 60px;
    border-radius: 16px; text-align: center; border: 2px solid #e94560;
  }
  #win-box h2 { font-size: 2rem; margin-bottom: 16px; }
  #win-box button {
    padding: 12px 32px; background: #e94560; border: none; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 1.1rem; margin-top: 12px;
  }
  #pick-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    justify-content: center; align-items: center;
  }
  #pick-overlay.show { display: flex; }
  #pick-box {
    background: #16213e; padding: 40px 50px;
    border-radius: 16px; text-align: center;
    border: 2px solid #e94560; max-width: 440px;
  }
  #pick-box h2 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
  #pick-box p { color: #aaa; margin-bottom: 24px; font-size: 0.95rem; }
  #pick-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  #pick-buttons button {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 20px 32px; border: 2px solid #2a3a5c; background: #1a1a2e;
    color: #fff; border-radius: 12px; cursor: pointer; font-size: 1rem;
    transition: border-color 0.2s, background 0.2s;
  }
  #pick-buttons button:hover { background: #1f2945; }
  #pick-x:hover { border-color: #4fc3f7; }
  #pick-o:hover { border-color: #ef5350; }
  .pick-symbol { font-size: 2.4rem; font-weight: bold; }
  .pick-symbol-x { color: #4fc3f7; }
  .pick-symbol-o { color: #ef5350; }
  .pick-hint { font-size: 0.8rem; color: #888; }
  /* Secondary buttons row (PvP + Bot vs Bot) */
  #pick-secondary { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
  #pick-secondary button {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; border: 1px solid #2a3a5c; background: #1a1a2e;
    color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }
  #pick-secondary button:hover { background: #1f2945; color: #fff; }
  #pick-pvp:hover { border-color: #66bb6a; color: #66bb6a; }
  #pick-watch:hover { border-color: #ffd740; color: #ffd740; }
  .pick-mini-icon { font-weight: bold; font-size: 1rem; }
  .pick-mini-pvp { color: #66bb6a; }
  .pick-mini-bot { color: #ffd740; }
  /* Difficulty selector */
  #difficulty-section { margin-bottom: 24px; }
  #difficulty-section label { color: #aaa; font-size: 0.95rem; margin-right: 8px; }
  #difficulty-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  #difficulty-buttons button {
    padding: 8px 20px; border: 2px solid #2a3a5c; background: #1a1a2e;
    color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
  }
  #difficulty-buttons button:hover { background: #1f2945; color: #fff; }
  #difficulty-buttons button.selected { border-color: #ffd740; color: #ffd740; background: #2a2a1e; }
  #difficulty-buttons button.selected.easy { border-color: #66bb6a; color: #66bb6a; background: #1e2a1e; }
  #difficulty-buttons button.selected.medium { border-color: #ffa726; color: #ffa726; background: #2a2a1e; }
  #difficulty-buttons button.selected.hard { border-color: #ef5350; color: #ef5350; background: #2a1e1e; }
  /* Hard depth input */
  #depth-section {
    display: none; margin-top: 10px;
    justify-content: center; align-items: center; gap: 10px;
  }
  #depth-section.show { display: flex; }
  #depth-section label { color: #aaa; font-size: 0.85rem; }
  #depth-input {
    width: 60px; padding: 6px 10px; border: 2px solid #ef5350; background: #1a1a2e;
    color: #ef5350; border-radius: 6px; font-size: 1rem; text-align: center;
    font-family: 'Segoe UI', sans-serif;
  }
  #depth-input:focus { outline: none; border-color: #ff7043; }
  #depth-hint { color: #666; font-size: 0.75rem; }
  /* Playstyle selector */
  #playstyle-section { margin-bottom: 20px; }
  #playstyle-section label { color: #aaa; font-size: 0.95rem; margin-right: 8px; }
  #playstyle-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  #playstyle-buttons button {
    padding: 8px 20px; border: 2px solid #2a3a5c; background: #1a1a2e;
    color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
  }
  #playstyle-buttons button:hover { background: #1f2945; color: #fff; }
  #playstyle-buttons button.selected { border-color: #ffd740; color: #ffd740; background: #2a2a1e; }
  #playstyle-buttons button.selected.aggressive { border-color: #ff5252; color: #ff5252; background: #2a1e1e; }
  #playstyle-buttons button.selected.balanced { border-color: #ffa726; color: #ffa726; background: #2a2a1e; }
  #playstyle-buttons button.selected.defensive { border-color: #42a5f5; color: #42a5f5; background: #1e1e2a; }
  .bot-only { display: none; }
</style>
</head>
<body>
<div id="header">
  <h1>Hex Tic Tac Toe</h1>
  <div id="status"></div>
  <button id="btn-reset" onclick="resetGame()">New Game</button>
</div>
<canvas id="canvas"></canvas>
<div id="win-overlay">
  <div id="win-box">
    <h2 id="win-msg"></h2>
    <button onclick="showPickSide()">Play Again</button>
  </div>
</div>
<div id="pick-overlay" class="show">
  <div id="pick-box">
    <h2>Choose your side</h2>
    <p>X goes first (1 move), then turns alternate with 2 moves each.</p>
    <div id="difficulty-section" class="bot-only">
      <label>Bot Difficulty:</label>
      <div id="difficulty-buttons">
        <button class="easy" onclick="setDifficulty('easy', this)">Easy</button>
        <button class="medium selected medium" onclick="setDifficulty('medium', this)">Medium</button>
        <button class="hard" onclick="setDifficulty('hard', this)">Hard</button>
      </div>
      <div id="depth-section" class="bot-only">
        <label>Search depth:</label>
        <input id="depth-input" type="number" min="1" max="99" value="4" onchange="setHardDepth(this.value)">
        <span id="depth-hint">4 = default, higher = slower but stronger</span>
      </div>
    </div>
    <div id="playstyle-section" class="bot-only">
      <label>Playstyle:</label>
      <div id="playstyle-buttons">
        <button class="aggressive" onclick="setPlaystyle('aggressive', this)">Aggressive</button>
        <button class="balanced selected balanced" onclick="setPlaystyle('balanced', this)">Balanced</button>
        <button class="defensive" onclick="setPlaystyle('defensive', this)">Defensive</button>
      </div>
    </div>
    <div id="pick-buttons">
      <button id="pick-x" class="bot-only" onclick="startGame('X')">
        <span class="pick-symbol pick-symbol-x">X</span>
        <span>Play as X</span>
        <span class="pick-hint">You go first</span>
      </button>
      <button id="pick-o" class="bot-only" onclick="startGame('O')">
        <span class="pick-symbol pick-symbol-o">O</span>
        <span>Play as O</span>
        <span class="pick-hint">Bot goes first</span>
      </button>
    </div>
    <div id="pick-secondary">
      <button id="pick-pvp" onclick="startGame('pvp')">
        <span class="pick-mini-icon pick-mini-pvp">PvP</span>
        <span>Player vs Player</span>
      </button>
      <button id="pick-watch" class="bot-only" onclick="startGame('watch')">
        <span class="pick-mini-icon pick-mini-bot">AI</span>
        <span>Bot vs Bot</span>
      </button>
    </div>
  </div>
</div>

<!-- Bot AI: remove this line for tournament (human vs human only) -->
<script src="hex-bot.js"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const winOverlay = document.getElementById('win-overlay');
const winMsg = document.getElementById('win-msg');
const pickOverlay = document.getElementById('pick-overlay');

// Check if bot is available
const botAvailable = !!window.HEX_BOT_LOADED;

// Show bot-only UI elements if bot is loaded
if (botAvailable) {
  document.querySelectorAll('.bot-only').forEach(el => el.classList.remove('bot-only'));
}

// Hex geometry
const HEX_SIZE = 32;
const sqrt3 = Math.sqrt(3);

// Camera
let camX = 0, camY = 0, zoom = 1;
let dragging = false, dragStartX, dragStartY, camStartX, camStartY;

// Game state — exposed on window so bot can access them
window.board = {};
window.currentPlayer = 'X';
window.movesLeft = 1;
window.movesPerTurn = 1;
window.gameOver = false;
window.winLine = null;
window.botEnabled = true;
window.botThinking = false;
window.botPlayer = 'O';
window.humanPlayer = 'X';
window.gameStarted = false;
window.botVsBot = false;
window.botDifficulty = 'medium';
window.botPlaystyle = 'balanced';
window.hardDepth = 4;
window.pvpMode = false;

// Convenience aliases
let board = window.board;

// Piece tracking (shared with bot)
window.pieceList = [];
window.comCache = { X: { sq: 0, sr: 0, n: 0 }, O: { sq: 0, sr: 0, n: 0 } };

function resetPieceTracking() {
  window.pieceList = [];
  window.comCache.X.sq = 0; window.comCache.X.sr = 0; window.comCache.X.n = 0;
  window.comCache.O.sq = 0; window.comCache.O.sr = 0; window.comCache.O.n = 0;
}

function trackPiece(q, r, player) {
  window.pieceList.push({ q, r, player });
  window.comCache[player].sq += q;
  window.comCache[player].sr += r;
  window.comCache[player].n++;
}

function setDifficulty(level, btn) {
  window.botDifficulty = level;
  document.querySelectorAll('#difficulty-buttons button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Show/hide depth input for hard mode
  const depthEl = document.getElementById('depth-section');
  if (depthEl) {
    if (level === 'hard') depthEl.classList.add('show');
    else depthEl.classList.remove('show');
  }
}

function setHardDepth(val) {
  const n = parseInt(val, 10);
  if (n >= 1) window.hardDepth = n;
}

function setPlaystyle(style, btn) {
  window.botPlaystyle = style;
  document.querySelectorAll('#playstyle-buttons button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function showPickSide() {
  winOverlay.classList.remove('show');
  pickOverlay.classList.add('show');
  window.gameStarted = false;
}

function startGame(side) {
  window.pvpMode = (side === 'pvp');
  window.botVsBot = (side === 'watch');

  if (window.pvpMode) {
    window.humanPlayer = null;
    window.botPlayer = null;
    window.botEnabled = false;
  } else if (window.botVsBot) {
    window.humanPlayer = null;
    window.botPlayer = null;
    window.botEnabled = true;
  } else {
    window.humanPlayer = side;
    window.botPlayer = side === 'X' ? 'O' : 'X';
    window.botEnabled = true;
  }

  window.board = {};
  board = window.board;
  resetPieceTracking();
  window.currentPlayer = 'X';
  window.movesLeft = 1;
  window.movesPerTurn = 1;
  window.gameOver = false;
  window.winLine = null;
  window.botThinking = false;
  camX = 0; camY = 0; zoom = 1;
  window.gameStarted = true;
  pickOverlay.classList.remove('show');
  winOverlay.classList.remove('show');
  updateStatus();
  draw();

  if (botAvailable && !window.pvpMode && (window.botVsBot || window.botPlayer === 'X')) {
    window.scheduleBotMove();
  }
}

function resetGame() { showPickSide(); }

window.isBotTurn = function() {
  if (window.pvpMode || !botAvailable) return false;
  return window.botVsBot || window.currentPlayer === window.botPlayer;
};

function updateStatus() {
  if (!window.gameStarted) { statusEl.innerHTML = ''; return; }
  if (window.gameOver) { statusEl.innerHTML = ''; return; }
  const cp = window.currentPlayer;
  const cls = cp === 'X' ? 'player-x' : 'player-o';

  const depthInfo = (window.botDifficulty === 'hard' && window.botSearchDepth) ?
    ` <span style="color:#888;font-size:0.8rem">[depth ${window.botSearchDepth}${window.botNodesSearched ? ', ' + window.botNodesSearched + ' nodes' : ''}${window.botPruned ? ', ' + window.botPruned + ' pruned' : ''}]</span>` : '';

  if (window.pvpMode) {
    const ml = window.movesLeft;
    statusEl.innerHTML = `<span class="${cls}">${cp}</span> — ${ml} move${ml > 1 ? 's' : ''} left`;
  } else if (window.botVsBot) {
    const diff = window.botDifficulty.charAt(0).toUpperCase() + window.botDifficulty.slice(1);
    statusEl.innerHTML = `<span class="${cls}">${cp} (Bot ${diff})</span> — thinking...${depthInfo}`;
  } else {
    const diff = window.botDifficulty.charAt(0).toUpperCase() + window.botDifficulty.slice(1);
    const isBot = cp === window.botPlayer;
    const label = isBot ? `Bot ${diff}` : 'You';
    const thinking = isBot ? ' — thinking...' : ` — ${window.movesLeft} move${window.movesLeft > 1 ? 's' : ''} left`;
    statusEl.innerHTML = `<span class="${cls}">${cp} (${label})</span>${thinking}${isBot ? depthInfo : ''}`;
  }
}

// ── Hex math ──
function hexToPixel(q, r) {
  return { x: HEX_SIZE * (3/2 * q), y: HEX_SIZE * (sqrt3/2 * q + sqrt3 * r) };
}
function pixelToHex(px, py) {
  return hexRound((2/3 * px) / HEX_SIZE, (-1/3 * px + sqrt3/3 * py) / HEX_SIZE);
}
function hexRound(qf, rf) {
  const sf = -qf - rf;
  let q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  const dq = Math.abs(q - qf), dr = Math.abs(r - rf), ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return { q, r };
}

function drawHex(cx, cy, size, fill, stroke, lineWidth) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    const x = cx + size * Math.cos(angle);
    const y = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth || 1; ctx.stroke(); }
}

// ── Game rules ──
const DIRS = [{ dq: 1, dr: 0 }, { dq: 0, dr: 1 }, { dq: -1, dr: 1 }];

function checkWin(q, r, player) {
  for (const dir of DIRS) {
    let cells = [{ q, r }];
    for (let i = 1; i < 6; i++) {
      if (board[(q + dir.dq * i) + ',' + (r + dir.dr * i)] === player) cells.push({ q: q + dir.dq * i, r: r + dir.dr * i });
      else break;
    }
    for (let i = 1; i < 6; i++) {
      if (board[(q - dir.dq * i) + ',' + (r - dir.dr * i)] === player) cells.unshift({ q: q - dir.dq * i, r: r - dir.dr * i });
      else break;
    }
    if (cells.length >= 6) return cells.slice(0, 6);
  }
  return null;
}

// ── Threat detection (visual overlay) ──
function countSpace(q, r, dq, dr, player, need) {
  let count = 0;
  for (let i = 1; i <= need; i++) {
    const cell = board[(q + dq * i) + ',' + (r + dr * i)];
    if (cell === player || cell === undefined) count++;
    else break;
  }
  return count;
}

// Exposed for bot to use
window.hasSpaceForSix = function(startQ, startR, dq, dr, len, player) {
  const need = 6 - len;
  const spaceBefore = countSpace(startQ, startR, -dq, -dr, player, need);
  if (spaceBefore >= need) return true;
  const endQ = startQ + dq * (len - 1), endR = startR + dr * (len - 1);
  const spaceAfter = countSpace(endQ, endR, dq, dr, player, need);
  return (spaceBefore + spaceAfter) >= need;
};

// Exposed for bot to use — threat completions are critical candidates
window.findThreats = findThreats;
function findThreats() {
  const threats = [];
  const checked = new Set();
  const pl = window.pieceList;
  for (let pi = 0; pi < pl.length; pi++) {
    const piece = pl[pi];
    const player = piece.player, pq = piece.q, pr = piece.r;
    for (const dir of DIRS) {
      let startQ = pq, startR = pr;
      while (board[(startQ - dir.dq) + ',' + (startR - dir.dr)] === player) { startQ -= dir.dq; startR -= dir.dr; }
      const runKey = startQ * 100003 + startR * 7 + dir.dq * 3 + dir.dr + (player === 'X' ? 0 : 50);
      if (checked.has(runKey)) continue;
      checked.add(runKey);
      const cells = [];
      let cq = startQ, cr = startR;
      while (board[cq + ',' + cr] === player) { cells.push({ q: cq, r: cr }); cq += dir.dq; cr += dir.dr; }
      const len = cells.length;
      if (len < 3) continue;
      if (!window.hasSpaceForSix(startQ, startR, dir.dq, dir.dr, len, player)) continue;
      const beforeQ = startQ - dir.dq, beforeR = startR - dir.dr;
      const afterQ = cells[len-1].q + dir.dq, afterR = cells[len-1].r + dir.dr;
      const completions = [];
      if (!board[beforeQ + ',' + beforeR]) completions.push({ q: beforeQ, r: beforeR });
      if (!board[afterQ + ',' + afterR]) completions.push({ q: afterQ, r: afterR });
      if (completions.length === 0) continue;
      threats.push({ player, cells, completions, severity: len >= 4 ? 'critical' : 'warning' });
    }
  }
  return threats;
}

// ── Move handling ──
function placeMove(q, r) {
  if (window.gameOver) return;
  if (window.botVsBot) return;
  if (window.botEnabled && window.currentPlayer === window.botPlayer) return;
  if (board[q + ',' + r]) return;
  applyMove(q, r);
}

window.applyMove = function(q, r) {
  const k = q + ',' + r;
  board[k] = window.currentPlayer;
  trackPiece(q, r, window.currentPlayer);
  window.movesLeft--;

  const win = checkWin(q, r, window.currentPlayer);
  if (win) {
    window.gameOver = true;
    window.winLine = win;
    const col = window.currentPlayer === 'X' ? '#4fc3f7' : '#ef5350';
    winMsg.innerHTML = `<span style="color:${col}">${window.currentPlayer}</span> wins!`;
    updateStatus();
    draw();
    setTimeout(() => winOverlay.classList.add('show'), 300);
    return;
  }

  if (window.movesLeft <= 0) {
    window.currentPlayer = window.currentPlayer === 'X' ? 'O' : 'X';
    if (window.movesPerTurn === 1) window.movesPerTurn = 2;
    window.movesLeft = window.movesPerTurn;
  }

  updateStatus();
  draw();

  if (!window.gameOver && !window.botThinking && window.isBotTurn()) {
    window.scheduleBotMove();
  }
};

// Stub scheduleBotMove if bot not loaded (so startGame doesn't crash)
if (!window.scheduleBotMove) {
  window.scheduleBotMove = function() {};
}

// ── Rendering ──
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - document.getElementById('header').offsetHeight;
  draw();
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(w / 2 + camX * zoom, h / 2 + camY * zoom);
  ctx.scale(zoom, zoom);

  const viewLeft = (-w/2 - camX * zoom) / zoom;
  const viewRight = (w/2 - camX * zoom) / zoom;
  const viewTop = (-h/2 - camY * zoom) / zoom;
  const viewBottom = (h/2 - camY * zoom) / zoom;

  const corners = [
    pixelToHex(viewLeft, viewTop), pixelToHex(viewRight, viewTop),
    pixelToHex(viewLeft, viewBottom), pixelToHex(viewRight, viewBottom),
  ];
  const pad = 3;
  const minQ = Math.min(...corners.map(c => c.q)) - pad;
  const maxQ = Math.max(...corners.map(c => c.q)) + pad;
  const minR = Math.min(...corners.map(c => c.r)) - pad;
  const maxR = Math.max(...corners.map(c => c.r)) + pad;

  for (let q = minQ; q <= maxQ; q++) {
    for (let r = minR; r <= maxR; r++) {
      const { x, y } = hexToPixel(q, r);
      if (x < viewLeft - HEX_SIZE*2 || x > viewRight + HEX_SIZE*2 ||
          y < viewTop - HEX_SIZE*2 || y > viewBottom + HEX_SIZE*2) continue;
      drawHex(x, y, HEX_SIZE - 1, '#1f2945', '#2a3a5c', 1);
    }
  }

  for (const [k, player] of Object.entries(board)) {
    const ci = k.indexOf(',');
    const q = +k.substring(0, ci), r = +k.substring(ci + 1);
    const { x, y } = hexToPixel(q, r);
    const wl = window.winLine;
    const isWinCell = wl && wl.some(c => c.q === q && c.r === r);
    if (player === 'X') {
      drawHex(x, y, HEX_SIZE - 1, isWinCell ? '#0288d1' : '#1a3a5c', '#4fc3f7', 2);
      drawX(x, y);
    } else {
      drawHex(x, y, HEX_SIZE - 1, isWinCell ? '#c62828' : '#4a1a1a', '#ef5350', 2);
      drawO(x, y);
    }
  }

  if (!window.gameOver) {
    const threats = findThreats();
    for (const threat of threats) {
      const color = threat.player === 'X' ? '#4fc3f7' : '#ef5350';
      const isCritical = threat.severity === 'critical';
      if (threat.cells.length >= 2) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = isCritical ? 4 : 2.5;
        ctx.globalAlpha = isCritical ? 0.7 : 0.35;
        ctx.setLineDash(isCritical ? [] : [6, 4]);
        ctx.lineCap = 'round';
        ctx.beginPath();
        const allCells = [...threat.cells];
        for (const comp of threat.completions) {
          const first = threat.cells[0];
          if (comp.q === first.q - (threat.cells[1].q - first.q) &&
              comp.r === first.r - (threat.cells[1].r - first.r)) {
            allCells.unshift(comp);
          } else { allCells.push(comp); }
        }
        for (let i = 0; i < allCells.length; i++) {
          const { x, y } = hexToPixel(allCells[i].q, allCells[i].r);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();
      }
      for (const comp of threat.completions) {
        const { x, y } = hexToPixel(comp.q, comp.r);
        ctx.save(); ctx.globalAlpha = isCritical ? 0.5 : 0.2;
        drawHex(x, y, HEX_SIZE - 1, color, null, 0); ctx.restore();
        ctx.save(); ctx.globalAlpha = isCritical ? 0.9 : 0.45;
        drawHex(x, y, HEX_SIZE - 1, null, color, isCritical ? 3 : 2); ctx.restore();
        if (isCritical) {
          ctx.save(); ctx.globalAlpha = 0.9; ctx.fillStyle = color;
          ctx.font = `bold ${HEX_SIZE * 0.6}px 'Segoe UI', sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('!', x, y); ctx.restore();
        }
      }
    }
  }

  if (window.winLine) {
    ctx.strokeStyle = '#ffd740'; ctx.lineWidth = 4; ctx.beginPath();
    for (let i = 0; i < window.winLine.length; i++) {
      const { x, y } = hexToPixel(window.winLine[i].q, window.winLine[i].r);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawX(cx, cy) {
  const s = HEX_SIZE * 0.35;
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - s, cy - s); ctx.lineTo(cx + s, cy + s);
  ctx.moveTo(cx + s, cy - s); ctx.lineTo(cx - s, cy + s);
  ctx.stroke();
}
function drawO(cx, cy) {
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, HEX_SIZE * 0.35, 0, Math.PI * 2); ctx.stroke();
}

// ── Input ──
canvas.addEventListener('mousedown', e => {
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  camStartX = camX; camStartY = camY; canvas.classList.remove('placing');
});
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camX = camStartX + (e.clientX - dragStartX) / zoom;
  camY = camStartY + (e.clientY - dragStartY) / zoom;
  draw();
});
canvas.addEventListener('mouseup', e => {
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  dragging = false; canvas.classList.add('placing');
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
    const rect = canvas.getBoundingClientRect();
    const worldX = (e.clientX - rect.left - canvas.width / 2) / zoom - camX;
    const worldY = (e.clientY - rect.top - canvas.height / 2) / zoom - camY;
    const { q, r } = pixelToHex(worldX, worldY);
    placeMove(q, r);
  }
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(0.3, Math.min(3, zoom * (e.deltaY < 0 ? 1.1 : 0.9)));
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    camStartX = camX; camStartY = camY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    camX = camStartX + (e.touches[0].clientX - dragStartX) / zoom;
    camY = camStartY + (e.touches[0].clientY - dragStartY) / zoom;
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom = Math.max(0.3, Math.min(3, zoom * dist / lastTouchDist));
    lastTouchDist = dist; draw();
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1 && dragging) {
    const dx = e.changedTouches[0].clientX - dragStartX;
    const dy = e.changedTouches[0].clientY - dragStartY;
    dragging = false;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
      const rect = canvas.getBoundingClientRect();
      const worldX = (e.changedTouches[0].clientX - rect.left - canvas.width / 2) / zoom - camX;
      const worldY = (e.changedTouches[0].clientY - rect.top - canvas.height / 2) / zoom - camY;
      const { q, r } = pixelToHex(worldX, worldY);
      placeMove(q, r);
    }
  }
});

window.addEventListener('resize', resizeCanvas);
canvas.classList.add('placing');
resizeCanvas();
</script>
</body>
</html>
